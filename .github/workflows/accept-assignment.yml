name: Accept Assignment

on:
  workflow_dispatch:
    inputs:
      userAccessToken:
        description: "Access token for student's GitHub / GitLab account"
        required: true
      assignmentName:
        description: "Name of assignment template directory within `assignments/` in assignment repository containing specific assignment to be accepted. Ex: If assignment template directory is `assignments/hello-world-project`, then assignmentName should be hello-world-project."
        required: true
      assignmentAcceptKey:
        description: "Secret key / passcode needed to accept the assignment, configured manually for each assignment within `assignments/assignments.conf` in the assignments repository"
      resultEncryptionKey:
        description: "Public encryption key that should be used to encrypt the results."
        required: true

env:
  ASSIGNMENT_READ_USERNAME: ${{ vars.ASSIGNMENT_READ_USERNAME }}
  ASSIGNMENT_READ_TOKEN: ${{ secrets.ASSIGNMENT_READ_TOKEN }}
  ASSIGNMENT_REPO: ${{ vars.ASSIGNMENT_REPO || github.repository }}
  STUDENT_PLATFORM: ${{ vars.STUDENT_PLATFORM }}
  STUDENT_PLATFORM_GIT_HOSTNAME: ${{ vars.STUDENT_PLATFORM_GIT_HOSTNAME }}
  STUDENT_ASSIGNMENT_ORGANIZATION: ${{ vars.STUDENT_ASSIGNMENT_ORGANIZATION }}
  STUDENT_ASSIGNMENT_WRITE_USERNAME: ${{ vars.ASSIGNMENT_WRITE_USERNAME }}
  STUDENT_ASSIGNMENT_WRITE_TOKEN: ${{ secrets.ASSIGNMENT_WRITE_TOKEN }}
  USER_ACCESS_TOKEN: ${{ inputs.userAccessToken }}
  ASSIGNMENT_NAME: ${{ inputs.assignmentName }}
  ASSIGNMENT_ACCEPT_KEY: ${{ inputs.assignmentAcceptKey }}
  RESULT_ENCRYPTION_KEY: ${{ inputs.resultEncryptionKey }}

jobs:
  accept-assignment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: 'repo'
      - name: Accept assignment
        run: |
          if [[ "$STUDENT_PLATFORM" == "github" ]]
          then
              STUDENT_PLATFORM_GIT_HOSTNAME="github.com"
          fi

          # Mask user access token and assignment accept key in logs
          echo "::add-mask::$USER_ACCESS_TOKEN"
          
          # Clone assignment repo
          git clone "https://${ASSIGNMENT_READ_USERNAME}:${ASSIGNMENT_READ_TOKEN}@${ASSIGNMENT_REPO}" assignments-repo

          # TODO Verify that given input key matches assignment's configured key (if a key is configured) before proceeding

          # Get user's GitHub username
          user_results=$(curl -L \
              -H "Authorization: Bearer ${USER_ACCESS_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              https://api.github.com/user)
          username=$(echo -n "$user_results" | jq -r '.login')

          student_assignment_repo="${ASSIGNMENT_NAME}-${username}"

          # Replace forbidden characters with hyphens
          student_assignment_repo=$(echo -n "$student_assignment_repo" | sed 's/[^a-zA-Z0-9_\.-]/-/g')
          
          # Create remote student assignment repo
          create_remote_repo_status=$(curl -s -o /dev/null -w "%{http_code}" -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $STUDENT_ASSIGNMENT_WRITE_TOKEN" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "https://api.github.com/orgs/${STUDENT_ASSIGNMENT_ORGANIZATION}/repos" \
              -d '{"name":"'"$student_assignment_repo"'","description":"'"${username}'s"' repository for assignment '"$ASSIGNMENT_NAME"'","private":true}')

          if [[ "$create_remote_repo_status" == "403" ]]
          then
              echo "Error: Authentication failed when generating student assignment repository" >&2
              exit 1
          elif [[ "$create_remote_repo_status" != "201" ]]
          then
              echo "Error: Got HTTP status $create_remote_repo_status when generating student assignment repository" >&2
              exit 1
          fi

          # Create local student assignment repo and push contents to remote
          # repo
          mkdir -p "$student_assignment_repo"
          cp -R assignments-repo/"$ASSIGNMENT_NAME"/* "$student_assignment_repo"
          (
              cd "$student_assignment_repo"
              git init -b main
              git commit -am "Robot: Instantiate assignment"
              remote_repo_git_url="https://${STUDENT_ASSIGNMENT_WRITE_USERNAME}:${STUDENT_ASSIGNMENT_WRITE_TOKEN}@${STUDENT_PLATFORM_GIT_HOSTNAME}/${STUDENT_ASSIGNMENT_ORGANIZATION}/${student_assignment_repo}.git"
              git push "$remote_repo_git_url" main
          )

          # Send invite to add student as outside collaborator for repo, or add
          # as collaborator directly under certain conditions (e.g., if they're
          # a member of the organization, or a member of a team that's already
          # a collaborator)

          add_collaborator_status=$(curl -L \
              -s -o curl.json -w "%{http_code}" \
              -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $STUDENT_ASSIGNMENT_WRITE_TOKEN" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "https://api.github.com/repos/${STUDENT_ASSIGNMENT_ORGANIZATION}/${student_assignment_repo}/collaborators/${username}" \
              -d '{"permission":"push"}')

          if [[ "$add_collaborator_status" == "403" ]]
          then
              echo "Error: Authentication failed when adding student as collaborator to their assignment repository" >&2
              exit 1
          elif [[ "$add_collaborator_status" == "201" ]]
          then
              # Invite sent. Auto-accept invite on student's behalf using the
              # oauth token (prevents invite from expiring due to student
              # negligence, which would require instructor intervention).
              filtered_curl_results=$(cat curl.json | jq -r '.repository.html_url,.url')
              student_repository_url=$(echo "$filtered_curl_results" | sed -n '1p')
              invite_url=$(echo "$filtered_curl_results" | sed -n '2p')
              accept_invite_status=$(curl -s -o /dev/null -w "%{http_code}" -L \
                  -X PATCH \
                  -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${USER_ACCESS_TOKEN}" \
                  -H "X-GitHub-Api-Version: 2026-03-10" \
                  "$invite_url")
              if [[ "$accept_invite_status" == "403" ]]
              then
                  echo "Error: Authentication failed when accepting outside collaborator invite on student's behalf" >&2
                  exit 1
              elif [[ "$accept_invite_status" != "204" ]]
              then
                  echo "Error: Got HTTP status $accept_invite_status when accepting outside collaborator invite on student's behalf" >&2
                  exit 1
              fi
          elif [[ "$add_collaborator_status" == "204" ]]
          then
              # Student added directly as collaborator (no invite was needed)
              student_repository_url=$(cat curl.json | jq -r '.repository.html_url')
          else
              echo "Error: Got HTTP status $add_collaborator_status when adding student as collaborator to their assignment repository" >&2
              exit 1
          fi
          rm -f curl.json

          # Store results for artifact
          mkdir -p result
          echo -n '{"repositoryURL": "'"$student_repository_url"'"}' > result/data.json
          echo -n '{"status": "success"}' > result/status.json
          
          # Zip results for encryption
          zip -qr result.zip result/*
          rm -f result/*

          # Encrypt result.zip. Generates result.zip.enc, aes-key.enc, and
          # iv.bin
          result_encryption_key_base64=$(echo -n "$RESULT_ENCRYPTION_KEY" | tr '_-' '/+')
          node repo/workflow-util/encrypt.js -f result.zip -k "$result_encryption_key_base64"
          
          # Delete plaintext result.zip, and move output files to result/
          rm -f result.zip
          mv result.zip.enc result/
          mv aes-key.enc result/
          mv iv.bin result/

      - name: Upload secure results
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result/
          retention-days: 1
