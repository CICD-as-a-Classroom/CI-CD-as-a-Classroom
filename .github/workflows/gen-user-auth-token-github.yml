name: Generate GitHub App user auth token by exchanging auth code

on:
  workflow_dispatch:
    inputs:
      authCode:
        description: "Code returned by https://github.com/login/oauth/authorize, used to finalize auth and retrieve user auth token"
        required: true
      pkceCodeVerifier:
        description: "Original, unhashed random string generated by frontend at start of auth flow for PKCE"
        required: true
      resultEncryptionKey:
        description: "Public encryption key that should be used to encrypt the user auth token. Client will retrieve encrypted user auth token from workflow log and decrypt it using their matching private decryption key."
        required: true
  
env:
  AUTH_CLIENT_ID: ${{ vars.AUTH_CLIENT_ID }}
  AUTH_CLIENT_SECRET: ${{ secrets.AUTH_CLIENT_SECRET }}
  AUTH_CODE: ${{ inputs.authCode }}
  PKCE_CODE_VERIFIER: ${{ inputs.pkceCodeVerifier }}
  RESULT_ENCRYPTION_KEY: ${{ inputs.resultEncryptionKey }}

jobs:
  gen_user_auth_token:
    runs-on: ubuntu-latest
    steps:
      - name: Generate user auth token
        run: |
          # Mask auth code and code verifier in logs
          echo "::add-mask::$AUTH_CODE"
          echo "::add-mask::$PKCE_CODE_VERIFIER"

          # Convert result encryption key to proper format
          base64_key=$(echo -n "$RESULT_ENCRYPTION_KEY" | tr '-_' '+/')
          echo "-----BEGIN PUBLIC KEY-----\n${base64_key}\n-----END PUBLIC KEY-----" > result-rsa-encryption-key.pub
          
          # TODO Retrieve auth token via cURL request
          #curl -X POST -G "https://github.com/login/oauth/access_token" \
          #  -d "client_id=$AUTH_CLIENT_ID" \
          #  -d "client_secret=$AUTH_CLIENT_SECRET" \
          #  -d "code=$AUTH_CODE" \
          #  -d "code_verifier=$PKCE_CODE_VERIFIER"

          # Store results for artifact
          mkdir -p result
          touch result/auth-token.bin
          echo '{"status": "success"}' > result/status.json
          
          # Zip results for encryption
          zip -r result.zip result/*
          rm -f result/*

          # Secure results. secure-results.js will generate an AES-256
          # key, encrypt result.zip with it (using AES-256-CBC for simplicity;
          # artifacts are immutable, hence tamper-proof, so GCM is unnecessary),
          # output result.zip.enc containing the salt and ciphertext, encrypt
          # the generated AES-256 key with the specified RSA key
          # (result-rsa-encryption-key.pub), and output
          # result-encryption-key.pem containing the encrypted AES key.
          # TODO
          touch result.zip.enc
          touch result-encryption-key.pem

          # Delete plaintext result.zip, and move result ciphertext to
          # result/
          rm -f result.zip
          mv result.zip.enc result/
          mv result-encryption-key.pem result/

      - name: Upload encrypted auth token
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result/
          retention-days: 1
