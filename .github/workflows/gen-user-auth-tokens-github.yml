name: Generate GitHub App user access token and refresh token by exchanging auth code

on:
  workflow_dispatch:
    inputs:
      authCode:
        description: "Code returned by https://github.com/login/oauth/authorize, used to finalize auth and retrieve user access token and refresh token"
        required: true
      pkceCodeVerifier:
        description: "Original, unhashed random string generated by frontend at start of auth flow for PKCE"
        required: true
      resultEncryptionKey:
        description: "Public encryption key that should be used to encrypt the results."
        required: true
  
env:
  AUTH_APP_ID: ${{ vars.AUTH_APP_ID }}
  AUTH_APP_SECRET: ${{ secrets.AUTH_APP_SECRET }}
  AUTH_CODE: ${{ inputs.authCode }}
  PKCE_CODE_VERIFIER: ${{ inputs.pkceCodeVerifier }}
  RESULT_ENCRYPTION_KEY: ${{ inputs.resultEncryptionKey }}

jobs:
  gen_user_auth_tokens:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: 'repo'
      - name: Generate user auth tokens
        run: |
          # Mask auth code and code verifier in logs
          echo "::add-mask::$AUTH_CODE"
          echo "::add-mask::$PKCE_CODE_VERIFIER"

          # Retrieve auth tokens via cURL request
          auth_results=$(curl -X POST -s -H "Accept: application/json" "https://github.com/login/oauth/access_token" \
            --url-query "client_id=$AUTH_APP_ID" \
            --url-query "client_secret=$AUTH_APP_SECRET" \
            --url-query "code=$AUTH_CODE" \
            --url-query "code_verifier=$PKCE_CODE_VERIFIER")

          access_token=$(echo "$auth_results" | jq '.access_token')
          refresh_token=$(echo "$auth_results" | jq '.refresh_token')
          access_token_expires_in=$(echo "$auth_results" | jq '.expires_in')
          refresh_token_expires_in=$(echo "$auth_results" | jq '.refresh_token_expires_in')

          # Mask tokens in logs
          echo "::add-mask::$access_token"
          echo "::add-mask::$refresh_token"

          # Store results for artifact
          mkdir -p result
          echo -n '{"accessToken": '"$access_token"', "refreshToken": '"$refresh_token"', "accessTokenExpiresInSeconds": '"$access_token_expires_in"', "refreshTokenExpiresInSeconds": '"$refresh_token_expires_in"'}' > result/data.json
          echo -n '{"status": "success"}' > result/status.json
          
          # Zip results for encryption
          zip -qr result.zip result/*
          rm -f result/*

          # Encrypt result.zip. Generates result.zip.enc, aes-key.enc, and
          # iv.bin
          result_encryption_key_base64=$(echo -n "$RESULT_ENCRYPTION_KEY" | tr '_-' '/+')
          node repo/workflow-util/encrypt.js -f result.zip -k "$result_encryption_key_base64"
          
          # Delete plaintext result.zip, and move output files to result/
          rm -f result.zip
          mv result.zip.enc result/
          mv aes-key.enc result/
          mv iv.bin result/

      - name: Upload secure results
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result/
          retention-days: 1
